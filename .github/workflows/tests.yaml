name: Run tests
on: push

jobs:
  build_deps_and_run_tests:
    name: Build dependecies and run tests
    runs-on: ubuntu-latest
    steps:

    - name: Check out repo 🐙😸
      uses: actions/checkout@master
      with:
        submodules: recursive

    - name: Build deps 🛠️
      run: sudo third_party/install.sh

    - name: Install LLVM and clang 🛠️
      run: sudo apt -y install llvm clang # libpolly-18-dev

    - name: Set up Python 🐍
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
    - run: pip install -r requirements-dev.txt

    # - name: Install mpi4py
    #   run: python -m pip install mpi4py halo --user

    - name: Build python package 📦
      run: pip install . && ./setup.py build_ext -i

    # - name: Run end2end.py
    #   run: python examples/end2end.py

    # - name: Run priority test
    #   run: LOG_LEVEL=DEBUG python -m unittest --locals tests.test_apps.TestSimple.test_end2end_polly

    - name: Run unittests
      run: python -m unittest -v --locals
